edition = "2024";

package projects.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

// Сервис EnvService предоставляет CRUD интерфейс для управления 
// окружениями, привязанными к GitHub-репозиториям и их конфигурациями
service EnvService {
  // GetEnvByGit возвращает окружение, связанное с проектом, по URL репозитория и названию ветки
  rpc GetEnvByGit (GetEnvByGitRequest) returns (EnvResponse);
  // GetEnv возвращает информацию об окружении по его ID
  rpc GetEnv (GetEnvRequest) returns (EnvResponse);
  // ListEnvs возвращает список окружений проекта с поддержкой пагинации
  rpc ListEnvs (ListEnvsRequest) returns (ListEnvsResponse);
  // CreateEnv создает новое окружение для проекта
  rpc CreateEnv (CreateEnvRequest) returns (EnvResponse);
  // UpdateEnv обновляет окружение по его ID
  rpc UpdateEnv (UpdateEnvRequest) returns (google.protobuf.Empty);
  // DeleteEnv удаляет окружение по его ID
  rpc DeleteEnv (DeleteEnvRequest) returns (google.protobuf.Empty);
}

// Ответ с данными окружения
message EnvResponse {
    string id = 1;
    string name = 2;
    string project_id = 3;
    string target_branch = 4;
    string domain_name = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

// Ответ со списком окружений
message ListEnvsResponse {
    repeated EnvResponse envs = 1;
}

// Параметры запросов на получение окружения по ID
message GetEnvRequest {
    string id = 1;
}

// Параметры запросов на получение окружения по репозиторию и ветке 
message GetEnvByGitRequest {
    string repo_url = 1;
    string target_branch = 2;
}

// Параметры запросов на получение списка окружений проекта
message ListEnvsRequest {
    string project_id = 1;
    int64 limit = 2;
    int64 offset = 3;
}

// Параметры запросов на создание окружения
message CreateEnvRequest {
    string name = 1;
    string project_id = 2;
    string target_branch = 3;
    string domain_name = 4;
}

// Параметры запросов на обновление окружений
message UpdateEnvRequest {
    string id = 1;
    string name = 2;
    string target_branch = 3;
    string domain_name = 4;
}

// Параметры запроса на удаление окружения
message DeleteEnvRequest {
    string id = 1;
}
