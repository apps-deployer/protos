edition = "2024";

package projects.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

// Сервис FrameworkService предоставляет CRUD интерфейс для управления 
// шаблонами конфигурации деплоя
service FrameworkService {
  // GetFramework возвращает шаблон конфигурации деплоя по его ID
  rpc GetFramework (GetFrameworkRequest) returns (FrameworkResponse);
  // ListFrameworks возвращает список шаблонов конфигурации деплоя
  rpc ListFrameworks (ListFrameworksRequest) returns (ListFrameworksResponse);
  // CreateFramework создает новый шаблон конфигурации деплоя
  rpc CreateFramework (CreateFrameworkRequest) returns (FrameworkResponse);
  // UpdateFramework обновляет шаблон конфигурации деплоя по его ID
  rpc UpdateFramework (UpdateFrameworkRequest) returns (google.protobuf.Empty);
  // DeleteFramework удаляет шаблон конфигурации деплоя по его ID
  rpc DeleteFramework (DeleteFrameworkRequest) returns (google.protobuf.Empty);
}

// Шаблоны конфигурации деплоя
message FrameworkResponse {
  string id = 1;
  string name = 2;
  string root_dir = 3;
  string output_dir = 4;
  string base_image = 5;
  string install_cmd = 6;
  string build_cmd = 7;
  string run_cmd = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  int32 app_port = 11;
}

// Список шаблонов конфигурации деплоя
message ListFrameworksResponse {
  repeated FrameworkResponse frameworks = 1;
}

// Параметры запросов для получения шаблона конфигурации по ID
message GetFrameworkRequest {
  string id = 1;
}

// Параметры запросов для получения списка шаблонов конфигурации
message ListFrameworksRequest {
  int64 limit = 1;
  int64 offset = 2;
}

// Параметры запросов для создания шаблона конфигурации деплоя
message CreateFrameworkRequest {
  string name = 1;
  string root_dir = 2;
  string output_dir = 3;
  string base_image = 4;
  string install_cmd = 5;
  string build_cmd = 6;
  string run_cmd = 7;
  int32 app_port = 8;
}

// Параметры запросов для обновления шаблона конфигурации деплоя по ID
message UpdateFrameworkRequest {
  string id = 1;
  string name = 2;
  string root_dir = 3;
  string output_dir = 4;
  string base_image = 5;
  string install_cmd = 6;
  string build_cmd = 7;
  string run_cmd = 8;
  int32 app_port = 9;
}

// Параметры запросов для удаления шаблона конфигурации по ID
message DeleteFrameworkRequest {
  string id = 1;
}
