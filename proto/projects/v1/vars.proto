edition = "2024";

package projects.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

// Сервис VarService предоставляет CRUD интерфейс для управления переменными проектов и окружений
service VarService {
  // GetProjectVar возвращает переменную проекта по ее ID
  rpc GetProjectVar (GetVarRequest) returns (VarResponse);
  // ListProjectVars возвращает список переменных проекта с поддержкой пагинации
  rpc ListProjectVars (ListProjectVarsRequest) returns (ListVarsResponse);
  // CreateProjectVar создает новую переменную проекта
  rpc CreateProjectVar (CreateProjectVarRequest) returns (VarResponse);
  // UpdateProjectVar обновляет переменную проекта по ее ID
  rpc UpdateProjectVar (UpdateVarRequest) returns (google.protobuf.Empty);
  // DeleteProjectVar удаляет переменную проекта по ее ID
  rpc DeleteProjectVar (GetVarRequest) returns (google.protobuf.Empty);

  // GetEnvVar возвращает переменную окружения по ее ID
  rpc GetEnvVar (GetVarRequest) returns (VarResponse);
  // ListEnvVars возвращает список переменных окружения для данного окружения с поддержкой пагинации
  rpc ListEnvVars (ListEnvVarsRequest) returns (ListVarsResponse);
  // CreateEnvVar создает новую переменную окружения для данного окружения
  rpc CreateEnvVar (CreateEnvVarRequest) returns (VarResponse);
  // UpdateEnvVar обновляет переменную окружения по ее ID
  rpc UpdateEnvVar (UpdateVarRequest) returns (google.protobuf.Empty);
  // DeleteEnvVar удаляет переменную окружения по ее ID
  rpc DeleteEnvVar (GetVarRequest) returns (google.protobuf.Empty);

  // ListAllVars возвращает список всех переменных, определенных в окружении, включая 
  // переменные проекта, с поддержкой пагинации
  rpc ListAllVars (ListAllVarsRequest) returns (ListVarsResponse);
}

// Ответ с данными переменной
message VarResponse {
    string id = 1;
    string key = 2;
    string value = 3;
}

// Ответ со списком переменных
message ListVarsResponse {
    repeated VarResponse vars = 1;
}

// Параметры запросов для получения переменной по ID
message GetVarRequest {
    string id = 1;
}

// Параметры запросов для получения списка переменных окружения для проекта
message ListProjectVarsRequest {
    string project_id = 1;
    int64 limit = 2;
    int64 offset = 3;
}

// Параметры запросов для получения списка переменных окружения для среды
message ListEnvVarsRequest {
    string env_id = 1;
    int64 limit = 2;
    int64 offset = 3;
}

// Параметры запросов для создания переменной окружения для проекта
message CreateProjectVarRequest {
    string project_id = 1;
    string key = 2;
    string value = 3;
}

// Параметры запросов для создания переменной окружения для среды
message CreateEnvVarRequest {
    string env_id = 1;
    string key = 2;
    string value = 3;
}

// Параметры запросов для обновления переменной по ID
message UpdateVarRequest {
    string id = 1;
    string value = 2;
}

// Параметры запросов для получения полного списка переменных в окружении
message ListAllVarsRequest {
    string env_id = 1;
}