edition = "2024";

package projects.v1;

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

message EnvVarResponse {
    int64 id = 1;
    int64 env_id = 2;
    string key = 3;
    string value = 4;
}

message ListEnvVarsResponse {
    repeated EnvVarResponse env_vars = 1;
}

message GetEnvVarRequest {
    int64 id = 1;
}

message ListEnvVarsRequest {
    int64 env_id = 1;
    int64 limit = 2;
    int64 offset = 3;
}

message CreateEnvVarRequest {
    int64 env_id = 1;
    string key = 2;
    string value = 3;
}

message UpdateEnvVarRequest {
    int64 id = 1;
    string value = 2;
}
