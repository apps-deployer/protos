
edition = "2024";

package projects.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

// Сервис DeployConfigService предоставляет интерфейс для чтения и обновления кофигурации деплоя проекта
service DeployConfigService {
  // GetResolvedDeployConfig возвращает конфигурацию деплоя по его ID, сгенерированную  
  // с учетом значений из шаблона и их переопределений 
  rpc GenerateDeployConfig (GetDeployConfigRequest) returns (GenerateDeployConfigResponse);
  // GetDeployConfig возвращает конфигурацию деплоя по его ID, без учета шаблона
  rpc GetDeployConfig (GetDeployConfigRequest) returns (DeployConfigResponse);
  // UpdateDeployConfig обновляет конфигурацию деплоя по его ID
  rpc UpdateDeployConfig (UpdateDeployConfigRequest) returns (google.protobuf.Empty);
}

// Конфигурация деплоя для проекта
message DeployConfigResponse {
  string id = 1;
  string project_id = 2;
  string framework_id = 3;
  string root_dir_override = 4; 
  string output_dir_override = 5;
  string base_image_override = 6;
  string install_cmd_override = 7;
  string build_cmd_override = 8;
  string run_cmd_override = 9;
}

// Конфигурация деплоя для проекта, сгенерированная с учетом фреймворка и переопределений
message GenerateDeployConfigResponse {
  string id = 1;
  string project_id = 2;
  string root_dir = 3;
  string output_dir = 4;
  string base_image = 5;
  string install_cmd = 6;
  string build_cmd = 7;
  string run_cmd = 8;
}

// Параметры запросов для получения конфигурации деплоя по ID
message GetDeployConfigRequest {
  string project_id = 1;
}

// Параметры запросов для обновления конфигурации деплоя по ID
message UpdateDeployConfigRequest {
  string id = 1;
  string framework_id = 2;
  string root_dir_override = 3; 
  string output_dir_override = 4;
  string base_image_override = 5;
  string install_cmd_override = 6;
  string build_cmd_override = 7;
  string run_cmd_override = 8;
}
