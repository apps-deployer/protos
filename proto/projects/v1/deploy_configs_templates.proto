edition = "2024";

package projects.v1;

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

// Шаблоны конфигурации деплоя
message DeployConfigsTemplateResponse {
  int64 id = 1;
  string name = 2;
  string root_dir = 3;
  string output_dir = 4;
  string base_image = 5;
  string install_cmd = 6;
  string build_cmd = 7;
  string run_cmd = 8;
}

// Список шаблонов конфигурации деплоя
message ListDeployConfigsTemplatesResponse {
  repeated DeployConfigsTemplateResponse deploy_configs_templates = 1;
}

// Параметры запросов для получения шаблона конфигурации по ID
message GetDeployConfigsTemplateRequest {
  int64 id = 1;
}

// Параметры запросов для получения списка шаблонов конфигурации
message ListDeployConfigsTemplatesRequest {
  int64 limit = 1;
  int64 offset = 2;
}

// Параметры запросов для создания шаблона конфигурации деплоя
message CreateDeployConfigsTemplateRequest {
  string name = 1;
  string root_dir = 2;
  string output_dir = 3;
  string base_image = 4;
  string install_cmd = 5;
  string build_cmd = 6;
  string run_cmd = 7;
}

// Параметры запросов для обновления шаблона конфигурации деплоя по ID
message UpdateDeployConfigsTemplateRequest {
  int64 id = 1;
  string name = 2;
  string root_dir = 3;
  string output_dir = 4;
  string base_image = 5;
  string install_cmd = 6;
  string build_cmd = 7;
  string run_cmd = 8;
}
