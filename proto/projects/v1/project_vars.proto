edition = "2024";

package projects.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

// Сервис ProjectVarService предоставляет CRUD интерфейс для управления переменными проекта
service ProjectVarService {
  // GetProjectVar возвращает переменную проекта по ее ID
  rpc GetProjectVar (GetProjectVarRequest) returns (ProjectVarResponse);
  // ListProjectVars возвращает список переменных проекта с поддержкой пагинации
  rpc ListProjectVars (ListProjectVarsRequest) returns (ListProjectVarsResponse);
  // CreateProjectVar создает новую переменную проекта
  rpc CreateProjectVar (CreateProjectVarRequest) returns (ProjectVarResponse);
  // UpdateProjectVar обновляет переменную проекта по ее ID
  rpc UpdateProjectVar (UpdateProjectVarRequest) returns (google.protobuf.Empty);
  // DeleteProjectVar удаляет переменную проекта по ее ID
  rpc DeleteProjectVar (GetProjectVarRequest) returns (google.protobuf.Empty);
}

// Ответ с данными переменной окружения для проекта
message ProjectVarResponse {
    int64 id = 1;
    int64 project_id = 2;
    string key = 3;
    string value = 4;
}

// Ответ со списком переменных окружения для проекта
message ListProjectVarsResponse {
    repeated ProjectVarResponse project_vars = 1;
}

// Параметры запросов для получения переменной окружения по ID
message GetProjectVarRequest {
    int64 id = 1;
}

// Параметры запросов для получения списка переменных окружения для проекта
message ListProjectVarsRequest {
    int64 project_id = 1;
    int64 limit = 2;
    int64 offset = 3;
}

// Параметры запросов для создания переменной окружения для проекта
message CreateProjectVarRequest {
    int64 project_id = 1;
    string key = 2;
    string value = 3;
}

// Параметры запросов для обновления переменной окружения по ID
message UpdateProjectVarRequest {
    int64 id = 1;
    string value = 2;
}
