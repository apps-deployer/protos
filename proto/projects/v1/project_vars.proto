edition = "2024";

package projects.v1;

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

message ProjectVarResponse {
    int64 id = 1;
    int64 project_id = 2;
    string key = 3;
    string value = 4;
}

message ListProjectVarsResponse {
    repeated ProjectVarResponse project_vars = 1;
}

message GetProjectVarRequest {
    int64 id = 1;
}

message ListProjectVarsRequest {
    int64 project_id = 1;
    int64 limit = 2;
    int64 offset = 3;
}

message CreateProjectVarRequest {
    int64 project_id = 1;
    string key = 2;
    string value = 3;
}

message UpdateProjectVarRequest {
    int64 id = 1;
    string value = 2;
}

