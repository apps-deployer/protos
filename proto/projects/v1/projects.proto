edition = "2024";

package projects.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/org/protos/gen/go/projects/v1;projectsv1";

message ProjectResponse {
  int64 id = 1;
  string name = 2;
  string repo_url = 3;
  int64 owner_id = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ListProjectsResponse {
  repeated ProjectResponse projects = 1;
}

message GetProjectRequest {
  int64 id = 1;
}

message ListProjectsRequest {
  int64 user_id = 1;
  int64 limit = 2;
  int64 offset = 3;
}

message CreateProjectRequest {
  string name = 1;
  string repo_url = 2;
  int64 deploy_config_template_id = 3;
}

message UpdateProjectRequest {
  int64 id = 1;
  string name = 2;
  string repo_url = 3;
  int64 owner_id = 4;
}
