edition = "2024";

package projects.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/apps-deployer/protos/gen/go/projects/v1;projectsv1";

// Сервис ProjectService предоставляет CRUD интерфейс для управления проектами
service ProjectService {
  // GetProject возвращает информацию о проекте по его ID
  rpc GetProject (GetProjectRequest) returns (ProjectResponse);
  // ListProjects возвращает список проектов, принадлежащих пользователю
  rpc ListProjects (ListProjectsRequest) returns (ListProjectsResponse);
  // CreateProject создает новый проект с указанными параметрами 
  rpc CreateProject (CreateProjectRequest) returns (ProjectResponse);
  // UpdateProject обновляет информацию о проекте по его ID
  rpc UpdateProject (UpdateProjectRequest) returns (google.protobuf.Empty);
  // DeleteProject удаляет проект по его ID
  rpc DeleteProject (GetProjectRequest) returns (google.protobuf.Empty);
}

// Ответ с данными проекта
message ProjectResponse {
  string id = 1;
  string name = 2;
  string repo_url = 3;
  string owner_id = 4;
  google.protobuf.Timestamp created_at = 5;
}

// Ответ со списком проектов пользователя
message ListProjectsResponse {
  repeated ProjectResponse projects = 1;
}

// Параметры запросов для получения проекта по ID
message GetProjectRequest {
  string id = 1;
}

// Параметры запросов для получения списка проектов пользователя
message ListProjectsRequest {
  string owner_id = 1;
  int64 limit = 2;
  int64 offset = 3;
}

// Параметры запросов для создания проекта
message CreateProjectRequest {
  string name = 1;
  string repo_url = 2;
  string owner_id = 3;
  string deploy_config_template_id = 4;
}

// Параметры запросов для обновления проекта
message UpdateProjectRequest {
  string id = 1;
  string name = 2;
  string repo_url = 3;
  string owner_id = 4;
}
